<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Learning Fun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        h1,
        h2 {
            font-family: 'Fredoka One', cursive;
        }

        .card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }

        .card:active {
            transform: scale(0.85) rotate(-5deg);
        }

        .wobble {
            animation: wobble 0.5s ease-in-out;
        }

        @keyframes wobble {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.1) rotate(5deg);
            }

            50% {
                transform: scale(1.1) rotate(-5deg);
            }

            100% {
                transform: scale(1) rotate(0);
            }
        }

        .category-btn {
            transition: all 0.2s;
        }

        .category-btn.active {
            background-color: #fbbf24;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.4);
            border-color: #f59e0b;
        }

        .gradient-border {
            background: linear-gradient(white, white) padding-box,
                linear-gradient(to right, #f472b6, #60a5fa) border-box;
            border: 4px solid transparent;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <h1 class="text-3xl md:text-4xl text-yellow-500 mb-4 text-center">🌟 Kids Learning Adventure 🌟</h1>

            <!-- Category Navigation -->
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="changeCategory('numbers')" id="btn-numbers"
                    class="category-btn px-4 py-2 rounded-full bg-blue-100 text-blue-600 font-bold border-2 border-blue-200 active">123</button>
                <button onclick="changeCategory('alphabet')" id="btn-alphabet"
                    class="category-btn px-4 py-2 rounded-full bg-pink-100 text-pink-600 font-bold border-2 border-pink-200">ABC</button>
                <button onclick="changeCategory('fruits')" id="btn-fruits"
                    class="category-btn px-4 py-2 rounded-full bg-green-100 text-green-600 font-bold border-2 border-green-200">🍎
                    Fruits</button>
                <button onclick="changeCategory('animals')" id="btn-animals"
                    class="category-btn px-4 py-2 rounded-full bg-orange-100 text-orange-600 font-bold border-2 border-orange-200">🦁
                    Animals</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-4 md:p-8">
        <div id="grid-container"
            class="max-w-5xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            <!-- Content generated by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-6 text-center text-gray-400 text-sm italic">
        "Play is the highest form of research" — Tap a card! 🔊
    </footer>

    <script>
        const appData = {
            numbers: Array.from({ length: 20 }, (_, i) => ({
                name: (i + 1).toString(),
                icon: (i + 1).toString(),
                color: 'text-blue-500',
                speech: (i + 1).toString()
            })),
            alphabet: [
                { letter: 'A', name: 'Apple', icon: '🍎' }, { letter: 'B', name: 'Ball', icon: '⚽' },
                { letter: 'C', name: 'Cat', icon: '🐱' }, { letter: 'D', name: 'Dog', icon: '🐶' },
                { letter: 'E', name: 'Elephant', icon: '🐘' }, { letter: 'F', name: 'Fish', icon: '🐟' },
                { letter: 'G', name: 'Giraffe', icon: '🦒' }, { letter: 'H', name: 'Horse', icon: '🐴' },
                { letter: 'I', name: 'Ice Cream', icon: '🍦' }, { letter: 'J', name: 'Jug', icon: '🏺' },
                { letter: 'K', name: 'Kite', icon: '🪁' }, { letter: 'L', name: 'Lion', icon: '🦁' },
                { letter: 'M', name: 'Monkey', icon: '🐒' }, { letter: 'N', name: 'Nose', icon: '👃' },
                { letter: 'O', name: 'Orange', icon: '🍊' }, { letter: 'P', name: 'Parrot', icon: '🦜' },
                { letter: 'Q', name: 'Queen', icon: '👸' }, { letter: 'R', name: 'Rabbit', icon: '🐰' },
                { letter: 'S', name: 'Sun', icon: '☀️' }, { letter: 'T', name: 'Tiger', icon: '🐯' },
                { letter: 'U', name: 'Umbrella', icon: '☂️' }, { letter: 'V', name: 'Van', icon: '🚐' },
                { letter: 'W', name: 'Watch', icon: '⌚' }, { letter: 'X', name: 'X-mas Tree', icon: '🎄' },
                { letter: 'Y', name: 'Yo-yo', icon: '🪀' }, { letter: 'Z', name: 'Zebra', icon: '🦓' }
            ].map(item => ({
                ...item,
                color: 'text-pink-500',
                speech: `${item.letter} .. for .. ${item.name}!` // Dots add natural pauses for "singing"
            })),
            fruits: [
                { name: 'Apple', icon: '🍎' }, { name: 'Banana', icon: '🍌' }, { name: 'Grapes', icon: '🍇' },
                { name: 'Orange', icon: '🍊' }, { name: 'Strawberry', icon: '🍓' }, { name: 'Watermelon', icon: '🍉' },
                { name: 'Pineapple', icon: '🍍' }, { name: 'Mango', icon: '🥭' }, { name: 'Pear', icon: '🍐' },
                { name: 'Cherry', icon: '🍒' }, { name: 'Blueberries', icon: '🫐' }, { name: 'Peach', icon: '🍑' },
                { name: 'Carrot', icon: '🥕' }, { name: 'Corn', icon: '🌽' }, { name: 'Broccoli', icon: '🥦' },
                { name: 'Eggplant', icon: '🍆' }, { name: 'Tomato', icon: '🍅' }, { name: 'Potato', icon: '🥔' }
            ].map(f => ({ ...f, speech: `${f.name}` })),
            animals: [
                { name: 'Lion', icon: '🦁' }, { name: 'Tiger', icon: '🐯' }, { name: 'Elephant', icon: '🐘' },
                { name: 'Monkey', icon: '🐒' }, { name: 'Giraffe', icon: '🦒' }, { name: 'Zebra', icon: '🦓' },
                { name: 'Panda', icon: '🐼' }, { name: 'Rabbit', icon: '🐰' }, { name: 'Dog', icon: '🐶' },
                { name: 'Cat', icon: '🐱' }, { name: 'Cow', icon: '🐮' }, { name: 'Pig', icon: '🐷' },
                { name: 'Chicken', icon: '🐔' }, { name: 'Duck', icon: '🦆' }, { name: 'Frog', icon: '🐸' },
                { name: 'Horse', icon: '🐴' }, { name: 'Sheep', icon: '🐑' }, { name: 'Penguin', icon: '🐧' }
            ].map(a => ({ ...a, speech: `This is a ${a.name}` }))
        };

        let currentCategory = 'numbers';
        const grid = document.getElementById('grid-container');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);

            // Musical Settings
            utterance.lang = 'en-US';
            utterance.rate = 0.75; // Much slower for clarity and "sing-song" feel
            utterance.pitch = 1.4; // Higher pitch sounds like a cartoon/teacher
            utterance.volume = 1;

            window.speechSynthesis.speak(utterance);
        }

        function renderGrid() {
            grid.innerHTML = '';
            const items = appData[currentCategory];

            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = `card gradient-border bg-white rounded-3xl p-4 md:p-6 flex flex-col items-center justify-center cursor-pointer shadow-sm hover:shadow-md border-2`;

                let content = '';
                if (currentCategory === 'numbers') {
                    content = `<div class="text-5xl md:text-6xl font-black ${item.color}">${item.icon}</div>`;
                } else if (currentCategory === 'alphabet') {
                    content = `
                        <div class="text-4xl md:text-5xl font-black ${item.color} mb-1">${item.letter}</div>
                        <div class="text-5xl md:text-6xl mb-2">${item.icon}</div>
                        <div class="text-gray-500 font-bold text-sm md:text-base">${item.name}</div>
                    `;
                } else {
                    content = `
                        <div class="text-6xl md:text-7xl mb-2">${item.icon}</div>
                        <div class="text-gray-600 font-bold text-lg md:text-xl capitalize">${item.name}</div>
                    `;
                }

                card.innerHTML = content;

                card.onclick = () => {
                    speak(item.speech);
                    // Add fun animation
                    card.classList.add('wobble', 'bg-yellow-50');
                    setTimeout(() => {
                        card.classList.remove('wobble', 'bg-yellow-50');
                    }, 500);
                };

                grid.appendChild(card);
            });
        }

        function changeCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            renderGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            speak(`Let's learn ${cat}!`);
        }

        window.onload = renderGrid;
    </script>
</body>

</html>
