<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toddler Paint & Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fffaf0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'cursive';
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .huge-btn {
            transition: transform 0.1s active;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .huge-btn:active {
            transform: scale(0.9);
        }

        canvas {
            touch-action: none;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .guide-point {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            border: 4px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            animation: pulse 1s infinite;
        }

        .vacuum-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
            background: rgba(255,255,255,0.7);
        }

        #interaction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            background: rgba(255, 250, 240, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Initial Interaction Overlay to enable Audio context -->
<div id="interaction-overlay" onclick="enableAudioAndStart()">
    <div class="bg-white p-12 rounded-[3rem] shadow-2xl flex flex-col items-center animate-bounce">
        <span class="text-9xl">🎨</span>
        <h1 class="text-4xl font-bold text-blue-600 mt-6">Tap to Start!</h1>
    </div>
</div>

<div id="app" class="h-screen w-screen flex flex-col relative overflow-hidden">
    
    <!-- Sidebar / Toolbar -->
    <div id="toolbar" class="absolute top-0 left-0 bottom-0 w-24 md:w-32 bg-white shadow-2xl z-20 flex flex-col items-center py-4 space-y-4 overflow-y-auto border-r-4 border-orange-100">
        <button onclick="setMode('free')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-purple-400 rounded-2xl shadow-md" title="Free Paint">
            <span class="text-3xl">🎨</span>
        </button>
        <div class="w-12 h-1 bg-gray-100 rounded-full"></div>
        
        <button onclick="setMode('v-line')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-blue-400 rounded-2xl shadow-md" title="Standing Line">
            <div class="w-1 h-10 bg-white rounded-full"></div>
        </button>
        <button onclick="setMode('h-line')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-green-400 rounded-2xl shadow-md" title="Sleeping Line">
            <div class="w-10 h-1 bg-white rounded-full"></div>
        </button>
        <button onclick="setMode('circle')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-yellow-400 rounded-2xl shadow-md" title="Round">
            <div class="w-8 h-8 border-4 border-white rounded-full"></div>
        </button>
        <button onclick="setMode('square')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-red-400 rounded-2xl shadow-md" title="Square">
            <div class="w-8 h-8 border-4 border-white rounded-sm"></div>
        </button>
        <button onclick="setMode('triangle')" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-orange-400 rounded-2xl shadow-md" title="Triangle">
            <span class="text-white text-3xl">▲</span>
        </button>

        <div class="flex-grow"></div>
        
        <button onclick="clearCanvas()" class="huge-btn w-16 h-16 md:w-20 md:h-20 bg-gray-200 rounded-full shadow-md mt-4">
            <span class="text-3xl">🧹</span>
        </button>
    </div>

    <!-- Main Canvas Area -->
    <div class="flex-1 relative ml-24 md:ml-32">
        <canvas id="paintCanvas"></canvas>
        <div id="guide-container"></div>
    </div>

    <!-- Full Screen Effects -->
    <div id="vacuum" class="vacuum-overlay flex flex-col items-center justify-center">
        <span class="text-9xl animate-bounce">🧹</span>
        <h2 class="text-4xl font-bold text-blue-600 mt-4">Cleaning!</h2>
    </div>
</div>

<script>
    const apiKey = ""; 
    let canvas, ctx;
    let isDrawing = false;
    let currentMode = 'free'; 
    let lastX = 0;
    let lastY = 0;
    let brushColor = '#9400D3';
    let audioEnabled = false;
    const colors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];

    window.onload = () => {
        initApp();
    };

    function enableAudioAndStart() {
        audioEnabled = true;
        document.getElementById('interaction-overlay').style.display = 'none';
        // No initial voice message per request
    }

    function initApp() {
        canvas = document.getElementById('paintCanvas');
        ctx = canvas.getContext('2d');
        resize();
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startDrawing({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            draw({ clientX: touch.clientX, clientY: touch.clientY });
        }, { passive: false });
        
        canvas.addEventListener('touchend', stopDrawing);

        window.addEventListener('resize', resize);
    }

    function resize() {
        const parent = canvas.parentElement;
        canvas.width = parent.clientWidth;
        canvas.height = parent.clientHeight;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 15;
        if(currentMode !== 'free') setupGuide();
    }

    function setMode(mode) {
        currentMode = mode;
        brushColor = colors[Math.floor(Math.random() * colors.length)];
        clearGuides();
        
        let label = "";
        let shouldSpeak = false;

        switch(mode) {
            case 'free': 
                label = "Free hand"; 
                shouldSpeak = false; // No voice for free hand
                break;
            case 'v-line': 
                label = "Standing line"; 
                shouldSpeak = true;
                setupGuide('line-v'); 
                break;
            case 'h-line': 
                label = "Sleeping line"; 
                shouldSpeak = true;
                setupGuide('line-h'); 
                break;
            case 'circle': 
                label = "Circle"; 
                shouldSpeak = true;
                setupGuide('circle'); 
                break;
            case 'square': 
                label = "Square"; 
                shouldSpeak = true;
                setupGuide('square'); 
                break;
            case 'triangle': 
                label = "Triangle"; 
                shouldSpeak = true;
                setupGuide('triangle'); 
                break;
        }

        if (shouldSpeak) {
            speak(label);
        }
    }

    function clearGuides() {
        document.getElementById('guide-container').innerHTML = '';
    }

    function setupGuide(type) {
        clearGuides();
        const container = document.getElementById('guide-container');
        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;
        const size = Math.min(w, h) * 0.3;

        let points = [];

        if (type === 'line-v') {
            points = [{x: centerX, y: centerY - size}, {x: centerX, y: centerY + size}];
        } else if (type === 'line-h') {
            points = [{x: centerX - size, y: centerY}, {x: centerX + size, y: centerY}];
        } else if (type === 'circle') {
            ctx.strokeStyle = '#eee';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, size, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            points = [{x: centerX, y: centerY - size}];
        } else if (type === 'square') {
            points = [
                {x: centerX - size, y: centerY - size},
                {x: centerX + size, y: centerY - size},
                {x: centerX + size, y: centerY + size},
                {x: centerX - size, y: centerY + size}
            ];
        } else if (type === 'triangle') {
            points = [
                {x: centerX, y: centerY - size},
                {x: centerX - size, y: centerY + size},
                {x: centerX + size, y: centerY + size}
            ];
        }

        points.forEach(p => {
            const el = document.createElement('div');
            el.className = 'guide-point';
            el.style.left = `${p.x - 20}px`;
            el.style.top = `${p.y - 20}px`;
            container.appendChild(el);
        });
    }

    function startDrawing(e) {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        [lastX, lastY] = [e.clientX - rect.left, e.clientY - rect.top];
    }

    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = brushColor;
        ctx.stroke();

        [lastX, lastY] = [x, y];
    }

    function stopDrawing() {
        isDrawing = false;
    }

    function clearCanvas() {
        const vacuum = document.getElementById('vacuum');
        vacuum.style.display = 'flex';
        // No voice for cleanup per request

        setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            vacuum.style.display = 'none';
            if(currentMode !== 'free') setupGuide(currentMode === 'v-line' ? 'line-v' : currentMode === 'h-line' ? 'line-h' : currentMode); 
        }, 1200);
    }

    async function speak(text) {
        if (!audioEnabled) return;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }], // Pure name, no extra instructions
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                    }
                })
            });

            const result = await response.json();
            const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            if (pcmData) {
                playWavFromPcm(pcmData);
            } else {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            }
        } catch (err) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
        }
    }

    function playWavFromPcm(base64Pcm) {
        const binaryString = atob(base64Pcm);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
        const wavHeader = createWavHeader(len, 24000);
        const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play().catch(e => console.error("Audio playback error:", e));
    }

    function createWavHeader(pcmLength, sampleRate) {
        const buffer = new ArrayBuffer(44);
        const view = new DataView(buffer);
        view.setUint32(0, 0x52494646, false); // RIFF
        view.setUint32(4, 36 + pcmLength, true);
        view.setUint32(8, 0x57415645, false); // WAVE
        view.setUint32(12, 0x666d7420, false); // fmt 
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        view.setUint32(36, 0x64617461, false); // data
        view.setUint32(40, pcmLength, true);
        return buffer;
    }
</script>
</body>
</html>
